name: 15 - Working with Matrices
on: 
  workflow_dispatch

jobs: 
  backwards-compatibility:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}-${{ matrix.node }}
    strategy:  
      matrix:
        node:
          - 18.x
          - 20.x
          - 21.x
        os:   
          - ubuntu-latest
          - windows-latest
        include: 
          - os: ubuntu-latest
            node: 16.x
          - os: ubuntu-latest
            node: 21.x
            tag: experimental

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Perform some tests
        run: |
          echo "Running tests on OS ${{ matrix.os }} and NodeJS ${{ matrix.node }}"

      - name: Upload test results
        run: echo "Uploading test results"
  
  include-example:
    name: ${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}-${{ matrix.opacity }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color: [red, green]
        shape: [circle, square]
        size: [small, large]
        include:
          - color: red
            opacity: 75
          - color : red
            opacity: 100
            shape: circle
          - color: red
            shape: triangle
          - opacity: 50
          - color: green
            shape: circle
            size: medium
        exclude:
          - color: green
            shape: circle
    steps:
      - name: dummy steps
        run: echo "${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}"
