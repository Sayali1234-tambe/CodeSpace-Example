name: 17 - 2 - Custom Actions - JS
run-name: 17 - 2 - Custom Actions - JS | BB-${{ inputs.base-branch }} - TB-${{ inputs.target-branch }} - WD-${{ inputs.working-dir }}

on: 
  workflow_dispatch:
    inputs: 
      head-branch:
        type: string
        default: main
      target-branch:
        type: string
        default: update-dependencies
      working-dir:
        type: string
        default: 17-custom-actions/react-app

permissions:
  contents: write
  pull-requests: write

jobs: 
  dependency-update:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
      - name: Check for dependency updates
        id: update-deps
        uses: ./.github/actions/js-dependency-update
        with:
          working-directory: ${{ inputs.working-dir }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          head-branch: ${{ inputs.head-branch }}
          target-branch: ${{ inputs.target-branch }}
      - name: Check if updates were available
        run: |
          echo "Updates were ${{ steps.update-deps.outputs.updates-available == 'true' && '' || 'not' }} available."
          