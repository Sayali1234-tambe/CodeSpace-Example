name: 19 - 2 - Managing Concurrency
on: 
  workflow_dispatch 

jobs:
  ping-with-concurrency:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Docker - Ping URL with concurrency
        id: ping-url-concurrency
        uses: ./.github/actions/docker-ping-url
        with:
          url: "https://www.tttt.com"
          max-trials: 20
          delay-seconds: 5
  ping-without-concurrency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker - Ping URL without concurrency
        id: ping-url-no-concurrency
        uses: ./.github/actions/docker-ping-url
        with:
          url: "https://www.tttt.com"
          max-trials: 20
          delay-seconds: 5