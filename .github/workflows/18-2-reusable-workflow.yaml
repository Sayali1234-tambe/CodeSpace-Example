name: 18 - 2 - Reusable Workflows

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/18-1-reusable-workflows.yaml
    with:
      target-directory: "src"

  print-outputs:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Print build status
        run: echo "Build Status: ${{ needs.deploy.outputs.build-status }}"

      - name: Print URL
        run: echo "Deployed URL: ${{ needs.deploy.outputs.url }}"