name: 17 - 3 - Custom Actions - docker
run-name: 17 - 3 - Custom Actions - docker 
on:
  workflow_dispatch:
    inputs: 
      url:
        type: string
        default: 'https://www.google.com'
permissions:
  contents: write
  pull-requests: write

jobs: 
  ping-url:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
      - name: Docker - Ping URL
        uses: ./.github/actions/docker-ping-url
        with:
          url: ${{ inputs.url }}