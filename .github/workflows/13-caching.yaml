name: 13 - Using Caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        default: true
        description: Whether to execute cache step
      node-version:
        type: choice
        options:
          - 20.x
          - 21.x
          - 24.x
        default: 24.x
    outputs:
      deps-cache-key : steps.cache-key.outputs.CACHE_KEY

jobs:
  install-deps:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching/react-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: calculate cache key
        id: cache-key
        run: |
          echo "CACHE_KEY=deps-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('13-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"
      - name: Cache node_modules
        if: ${{ inputs.use-cache }}
        id: cache
        uses: actions/cache@v4
        with:
          path: 13-caching/react-app/node_modules
          key: deps-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('13-caching/react-app/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
  lint-test:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 13-caching/react-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache node_modules
        if: ${{ inputs.use-cache }}
        id: cache
        uses: actions/cache@v4
        with:
          path: 13-caching/react-app/node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Test
        run: npm run test

      - name: Linting
        run: echo "Linting ...."

      - name: Deploying to non-prod
        run: echo "Deploying to nonprod"
  build:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: 13-caching/react-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache node_modules
        if: ${{ inputs.use-cache }}
        id: cache
        uses: actions/cache@v4
        with:
          path: 13-caching/react-app/node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Build
        run: npm run build

      - name: Deploying to non-prod
        run: echo "Deploying to nonprod"