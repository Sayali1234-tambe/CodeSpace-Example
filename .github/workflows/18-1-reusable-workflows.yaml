name: 18 - 1 - Reusable Workflows - Reusable Definition

on: 
  workflow_call:
    inputs:
      target-directory:
        type: string
        required: true

outputs:
  build-status:
    description: "The status of the build process"
    value: ${{ steps.deploy.outputs.build-status }}
  
  url:
    description: "The URL of the deployed application"
    value: ${{ steps.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.deploy.outputs.build-status }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Deploy
        id: build
        run: |
          echo "Building using directory ${{ inputs.target-directory }}"
          echo "build-status = success" >> "$GITHUB_OUTPUT"
      
      - name: Deploy
        id: deploy
        run: |
          echo "Deploying build artifacts"
          echo "url = https://www.google.com" >> "$GITHUB_OUTPUT"